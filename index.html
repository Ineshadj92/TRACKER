<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SÈCHE TRACKER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #090b0f;
    --bg2: #0d1017;
    --bg3: #111520;
    --surface: #141820;
    --surface2: #1a1f2e;
    --border: #1f2535;
    --green: #00ff88;
    --green-dim: #00ff8822;
    --red: #ff2244;
    --red-dim: #ff224422;
    --gold: #ffc840;
    --gold-dim: #ffc84022;
    --text: #c8d0e0;
    --text-dim: #505870;
    --text-bright: #e8eeff;
    --week-sep: #ffc84018;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    overflow-x: hidden;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.25;
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px 8px;
    backdrop-filter: blur(20px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .title {
    font-family: 'Black Ops One', cursive;
    font-size: 22px;
    color: var(--gold);
    letter-spacing: 2px;
    text-shadow: 0 0 20px #ffc84066;
  }

  .autosave-badge {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--green);
    border: 1px solid var(--green);
    border-radius: 4px;
    padding: 2px 7px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .autosave-badge.blink {
    animation: blink-save 1.2s ease forwards;
  }
  @keyframes blink-save {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ── STATS ── */
  .stats-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .stats-scroll::-webkit-scrollbar { display: none; }

  .stat-card {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 14px;
    text-align: center;
    min-width: 90px;
  }
  .stat-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'Black Ops One', cursive;
    font-size: 20px;
    line-height: 1.1;
    margin-top: 2px;
  }
  .stat-value.gold  { color: var(--gold); text-shadow: 0 0 10px #ffc84055; }
  .stat-value.green { color: var(--green); text-shadow: 0 0 10px #00ff8855; }
  .stat-value.red   { color: var(--red); text-shadow: 0 0 10px #ff224455; }
  .stat-value.white { color: var(--text-bright); }

  /* ── COL HEADERS ── */
  .col-headers {
    position: sticky;
    top: var(--header-h, 120px);
    z-index: 99;
    background: var(--bg2);
    border-bottom: 2px solid var(--gold);
    display: grid;
    grid-template-columns: 90px repeat(5, 1fr) 70px;
    gap: 0;
  }
  .col-h {
    padding: 7px 4px;
    font-family: 'Black Ops One', cursive;
    font-size: 9px;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-align: center;
    text-transform: uppercase;
    border-right: 1px solid var(--border);
  }
  .col-h:last-child { border-right: none; }

  /* ── GRID ── */
  .grid-wrap { position: relative; z-index: 1; }

  .week-separator {
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--week-sep), var(--gold), var(--week-sep), transparent);
    margin: 0;
  }

  .day-row {
    display: grid;
    grid-template-columns: 90px repeat(5, 1fr) 70px;
    border-bottom: 1px solid var(--border);
    transition: background 0.2s;
  }
  .day-row:hover { background: #ffffff04; }

  .day-row.today {
    background: linear-gradient(90deg, #ffc84008, transparent);
  }

  /* Day label cell */
  .day-label {
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 1px;
    border-right: 1px solid var(--border);
  }
  .day-num {
    font-family: 'Black Ops One', cursive;
    font-size: 16px;
    color: var(--text);
    line-height: 1;
  }
  .day-row.today .day-num { color: var(--gold); text-shadow: 0 0 8px #ffc84088; }
  .day-name {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .today-badge {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--bg);
    background: var(--gold);
    border-radius: 3px;
    padding: 1px 4px;
    display: inline-block;
    margin-top: 2px;
  }

  /* Toggle cell */
  .toggle-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    border-right: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    min-height: 56px;
    position: relative;
    overflow: hidden;
  }
  .toggle-cell:last-child { border-right: none; }
  .toggle-cell.state-0 { background: transparent; }
  .toggle-cell.state-1 {
    background: var(--green-dim);
  }
  .toggle-cell.state-2 {
    background: var(--red-dim);
  }

  .toggle-icon {
    font-size: 18px;
    transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
  }
  .toggle-cell.state-0 .toggle-icon { opacity: 0.15; filter: grayscale(1); }
  .toggle-cell.state-1 .toggle-icon { color: var(--green); opacity: 1; }
  .toggle-cell.state-2 .toggle-icon { color: var(--red); opacity: 1; }

  @keyframes pop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.35); }
    70%  { transform: scale(0.9); }
    100% { transform: scale(1); }
  }
  .toggle-cell.popping .toggle-icon {
    animation: pop 0.3s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    animation: ripple-anim 0.4s linear;
    pointer-events: none;
  }
  @keyframes ripple-anim {
    to { transform: scale(4); opacity: 0; }
  }

  /* Weight cell */
  .weight-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
    min-height: 56px;
    transition: background 0.15s;
  }
  .weight-cell:active { background: var(--gold-dim); }
  .weight-val {
    font-family: 'Black Ops One', cursive;
    font-size: 15px;
    color: var(--gold);
    text-shadow: 0 0 8px #ffc84055;
    letter-spacing: 0.5px;
  }
  .weight-empty {
    font-size: 20px;
    opacity: 0.15;
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: #00000088;
    z-index: 200;
    display: flex;
    align-items: flex-end;
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    width: 100%;
    background: var(--surface2);
    border-top: 2px solid var(--gold);
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.34,1.1,.64,1);
  }
  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-title {
    font-family: 'Black Ops One', cursive;
    font-size: 16px;
    color: var(--gold);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-align: center;
  }
  .modal-date {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-align: center;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
  }

  .weight-input-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 24px;
  }
  .weight-input {
    background: var(--bg3);
    border: 2px solid var(--gold);
    border-radius: 12px;
    color: var(--gold);
    font-family: 'Black Ops One', cursive;
    font-size: 32px;
    width: 160px;
    text-align: center;
    padding: 12px 16px;
    outline: none;
    -webkit-appearance: none;
    appearance: none;
    box-shadow: 0 0 20px #ffc84033 inset;
  }
  .weight-input::placeholder { color: #ffc84044; }
  .weight-unit {
    font-family: 'Black Ops One', cursive;
    font-size: 20px;
    color: var(--gold);
    opacity: 0.6;
  }

  .modal-btns {
    display: grid;
    grid-template-columns: 1fr 1fr 1.2fr;
    gap: 10px;
  }
  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: none;
    border-radius: 10px;
    padding: 14px;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.96); opacity: 0.8; }
  .btn-clear  { background: var(--bg3); color: var(--text-dim); border: 1px solid var(--border); }
  .btn-cancel { background: var(--bg3); color: var(--red); border: 1px solid var(--red-dim); }
  .btn-save   { background: var(--gold); color: var(--bg); }

  /* ── SAFE AREA PADDING ── */
  .bottom-pad { height: env(safe-area-inset-bottom, 20px); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" id="mainHeader">
  <div class="header-top">
    <div class="title">⚡ SÈCHE</div>
    <div class="autosave-badge" id="autosaveBadge">AUTO-SAVE</div>
  </div>
  <div class="stats-scroll" id="statsBar"></div>
</div>

<!-- COL HEADERS -->
<div class="col-headers" id="colHeaders">
  <div class="col-h">Jour</div>
  <div class="col-h">Séance</div>
  <div class="col-h">Cardio</div>
  <div class="col-h">Cals</div>
  <div class="col-h">10K pas</div>
  <div class="col-h">Macros</div>
  <div class="col-h">Poids</div>
</div>

<!-- GRID -->
<div class="grid-wrap" id="gridWrap"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">⚖️ POIDS DU JOUR</div>
    <div class="modal-date" id="modalDate"></div>
    <div class="weight-input-wrap">
      <input class="weight-input" id="weightInput" type="number" inputmode="decimal" step="0.1" min="30" max="200" placeholder="—">
      <span class="weight-unit">kg</span>
    </div>
    <div class="modal-btns">
      <button class="btn btn-clear"  id="btnClear">Effacer</button>
      <button class="btn btn-cancel" id="btnCancel">Annuler</button>
      <button class="btn btn-save"   id="btnSave">Sauver</button>
    </div>
  </div>
</div>

<div class="bottom-pad"></div>

<script>
const STORAGE_KEY = 'seche_tracker_v1';
const COLS = ['seance', 'cardio', 'calories', 'pas', 'macros'];
const COL_ICONS = { seance:'🏋️', cardio:'🏃', calories:'🔥', pas:'👣', macros:'🥩' };
const DAYS_FR = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];

// State
let data = {};
let modalDayKey = null;

function getKey(date) {
  return date.toISOString().slice(0, 10);
}

function load() {
  try { data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch(e) { data = {}; }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  flashSave();
}

function flashSave() {
  const b = document.getElementById('autosaveBadge');
  b.classList.remove('blink');
  void b.offsetWidth;
  b.classList.add('blink');
  b.addEventListener('animationend', () => b.classList.remove('blink'), { once: true });
}

// Build 30 days
function getDays() {
  const days = [];
  const today = new Date();
  today.setHours(0,0,0,0);
  for (let i = 0; i < 30; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    days.push(d);
  }
  return days;
}

function ensureDay(key) {
  if (!data[key]) data[key] = { seance:0, cardio:0, calories:0, pas:0, macros:0, poids:null };
}

// Ripple effect
function addRipple(el, e) {
  const r = document.createElement('span');
  r.classList.add('ripple');
  const rect = el.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = (e.changedTouches ? e.changedTouches[0].clientX : e.clientX) - rect.left - size/2;
  const y = (e.changedTouches ? e.changedTouches[0].clientY : e.clientY) - rect.top - size/2;
  r.style.cssText = `width:${size}px;height:${size}px;left:${x}px;top:${y}px;`;
  const state = parseInt(el.dataset.state || 0);
  r.style.background = state === 1 ? '#00ff8844' : state === 2 ? '#ff224444' : '#ffffff22';
  el.appendChild(r);
  setTimeout(() => r.remove(), 500);
}

function renderGrid() {
  const wrap = document.getElementById('gridWrap');
  wrap.innerHTML = '';
  const days = getDays();
  const todayKey = getKey(new Date());

  days.forEach((d, i) => {
    const key = getKey(d);
    ensureDay(key);
    const dayData = data[key];
    const isToday = key === todayKey;
    const dayOfWeek = d.getDay();

    // Week separator (before day that starts a new week, except day 0)
    if (i > 0 && dayOfWeek === 1) {
      const sep = document.createElement('div');
      sep.className = 'week-separator';
      wrap.appendChild(sep);
    }

    // Row
    const row = document.createElement('div');
    row.className = 'day-row' + (isToday ? ' today' : '');
    row.dataset.key = key;

    // Day label
    const label = document.createElement('div');
    label.className = 'day-label';
    label.innerHTML = `
      <div class="day-num">${d.getDate()}</div>
      <div class="day-name">${DAYS_FR[dayOfWeek]} ${d.toLocaleDateString('fr',{month:'short'})}</div>
      ${isToday ? '<div class="today-badge">TODAY</div>' : ''}
    `;
    row.appendChild(label);

    // Toggle cols
    COLS.forEach(col => {
      const cell = document.createElement('div');
      const st = dayData[col] || 0;
      cell.className = `toggle-cell state-${st}`;
      cell.dataset.key = key;
      cell.dataset.col = col;
      cell.dataset.state = st;
      cell.innerHTML = `<span class="toggle-icon">${COL_ICONS[col]}</span>`;
      cell.addEventListener('click', handleToggle);
      row.appendChild(cell);
    });

    // Weight cell
    const wcell = document.createElement('div');
    wcell.className = 'weight-cell';
    wcell.dataset.key = key;
    wcell.dataset.date = d.toLocaleDateString('fr', { weekday:'long', day:'numeric', month:'long' });
    const poids = dayData.poids;
    if (poids !== null && poids !== undefined) {
      wcell.innerHTML = `<span class="weight-val">${parseFloat(poids).toFixed(1)}</span>`;
    } else {
      wcell.innerHTML = `<span class="weight-empty">⚖️</span>`;
    }
    wcell.addEventListener('click', handleWeightTap);
    row.appendChild(wcell);

    wrap.appendChild(row);
  });
}

function handleToggle(e) {
  const cell = e.currentTarget;
  const key = cell.dataset.key;
  const col = cell.dataset.col;
  let st = parseInt(cell.dataset.state || 0);
  st = (st + 1) % 3;

  // Pop animation
  cell.classList.remove('popping');
  void cell.offsetWidth;
  cell.classList.add('popping');
  cell.addEventListener('animationend', () => cell.classList.remove('popping'), { once: true });

  addRipple(cell, e);

  cell.classList.remove('state-0','state-1','state-2');
  cell.classList.add(`state-${st}`);
  cell.dataset.state = st;

  ensureDay(key);
  data[key][col] = st;
  save();
  updateStats();
}

function handleWeightTap(e) {
  const cell = e.currentTarget;
  modalDayKey = cell.dataset.key;
  document.getElementById('modalDate').textContent = cell.dataset.date;
  const cur = data[modalDayKey]?.poids;
  document.getElementById('weightInput').value = (cur !== null && cur !== undefined) ? cur : '';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(() => document.getElementById('weightInput').focus(), 350);
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalDayKey = null;
}

document.getElementById('btnCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('weightInput').value = '';
  if (modalDayKey) {
    ensureDay(modalDayKey);
    data[modalDayKey].poids = null;
    save();
    refreshWeightCell(modalDayKey);
    updateStats();
  }
  closeModal();
});

document.getElementById('btnSave').addEventListener('click', () => {
  const val = parseFloat(document.getElementById('weightInput').value);
  if (!isNaN(val) && val > 30 && val < 200 && modalDayKey) {
    ensureDay(modalDayKey);
    data[modalDayKey].poids = val;
    save();
    refreshWeightCell(modalDayKey);
    updateStats();
  }
  closeModal();
});

function refreshWeightCell(key) {
  const row = document.querySelector(`.day-row[data-key="${key}"]`);
  if (!row) return;
  const wcell = row.querySelector('.weight-cell');
  const poids = data[key]?.poids;
  if (poids !== null && poids !== undefined) {
    wcell.innerHTML = `<span class="weight-val">${parseFloat(poids).toFixed(1)}</span>`;
  } else {
    wcell.innerHTML = `<span class="weight-empty">⚖️</span>`;
  }
}

function updateStats() {
  const days = getDays();
  const todayKey = getKey(new Date());
  const todayData = data[todayKey] || {};

  // Score du jour
  let todayScore = 0;
  COLS.forEach(c => { if ((todayData[c] || 0) === 1) todayScore++; });

  // Global success rate
  let totalCells = 0, doneCells = 0;
  days.forEach(d => {
    const key = getKey(d);
    const dd = data[key] || {};
    COLS.forEach(c => {
      const st = dd[c] || 0;
      if (st !== 0) totalCells++;
      if (st === 1) doneCells++;
    });
  });
  const rate = totalCells > 0 ? Math.round((doneCells / totalCells) * 100) : 0;

  // Perfect days (5/5)
  let perfectDays = 0;
  days.forEach(d => {
    const key = getKey(d);
    const dd = data[key] || {};
    const score = COLS.filter(c => (dd[c] || 0) === 1).length;
    if (score === 5) perfectDays++;
  });

  // Weight evolution: find two most recent non-null weights
  const weights = days.map(d => data[getKey(d)]?.poids).filter(v => v !== null && v !== undefined);
  let weightDisplay = '—';
  let weightClass = 'white';
  if (weights.length >= 2) {
    const diff = weights[weights.length-1] - weights[weights.length-2];
    const sign = diff < 0 ? '↓' : diff > 0 ? '↑' : '=';
    weightDisplay = `${sign}${Math.abs(diff).toFixed(1)}`;
    weightClass = diff < 0 ? 'green' : diff > 0 ? 'red' : 'white';
  } else if (weights.length === 1) {
    weightDisplay = `${weights[0]}kg`;
    weightClass = 'gold';
  }

  const bar = document.getElementById('statsBar');
  bar.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Score Jour</div>
      <div class="stat-value gold">${todayScore}/5</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Réussite</div>
      <div class="stat-value ${rate >= 70 ? 'green' : rate >= 40 ? 'gold' : 'red'}">${rate}%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Parfaits</div>
      <div class="stat-value gold">${perfectDays}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Poids Δ</div>
      <div class="stat-value ${weightClass}">${weightDisplay}</div>
    </div>
  `;
}

// Sticky header height for col headers
function setStickyOffset() {
  const h = document.getElementById('mainHeader').offsetHeight;
  document.getElementById('colHeaders').style.top = h + 'px';
}

// Init
load();
renderGrid();
updateStats();
setStickyOffset();
window.addEventListener('resize', setStickyOffset);
</script>
</body>
</html>
